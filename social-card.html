<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1200px;
            height: 630px;
            font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif;
            background: #1a1a1a;
            display: flex;
            overflow: hidden;
        }

        .left {
            width: 620px;
            background: #1a1a1a;
            padding: 55px 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .left::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 38px,
                    rgba(218, 119, 86, 0.03) 38px,
                    rgba(218, 119, 86, 0.03) 39px
                );
            pointer-events: none;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background: #ff5f57; }
        .dot.yellow { background: #febc2e; }
        .dot.green { background: #28c840; }

        .terminal-title {
            margin-left: 12px;
            color: #666;
            font-size: 13px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .prompt {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 15px;
            color: #555;
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }

        .prompt .cmd { color: #DA7756; }

        .main-text {
            position: relative;
            z-index: 1;
        }

        .main-text h1 {
            font-size: 40px;
            font-weight: 700;
            color: #F5F0E8;
            line-height: 1.18;
            letter-spacing: -0.02em;
            margin-bottom: 18px;
        }

        .main-text h1 span { color: #DA7756; }

        .main-text p {
            font-size: 16px;
            color: #888;
            line-height: 1.5;
        }

        .badge {
            display: inline-block;
            margin-top: 22px;
            padding: 8px 18px;
            border: 1.5px solid #DA7756;
            border-radius: 6px;
            color: #DA7756;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .cursor {
            display: inline-block;
            width: 9px;
            height: 18px;
            background: #DA7756;
            margin-left: 2px;
            vertical-align: text-bottom;
        }

        /* Right panel */
        .right {
            width: 580px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .right::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, rgba(218, 119, 86, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .right img {
            width: 480px;
            height: auto;
            position: relative;
            z-index: 1;
            filter: brightness(1.05);
        }

        .community-tag {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
        }

        .community-tag .name {
            font-size: 15px;
            font-weight: 700;
            color: #DA7756;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .community-tag .sub {
            font-size: 11px;
            color: #666;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 4px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="left">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <span class="terminal-title">claude-community-uae</span>
        </div>
        <div class="prompt">$ claude <span class="cmd">--join community</span></div>
        <div class="prompt">$ <span class="cmd">connecting builders...</span><span class="cursor"></span></div>
        <div class="main-text">
            <h1>Where the best builders in the UAE <span>ship with Claude.</span></h1>
            <p>Developers. Technical practitioners. Real projects.</p>
            <div class="badge">Join the first cohort</div>
        </div>
    </div>
    <div class="right">
        <img src="claude-code-logo.jpg" alt="Claude Code" />
        <div class="community-tag">
            <div class="name">Claude Community</div>
            <div class="sub">United Arab Emirates</div>
        </div>
    </div>
</body>
</html>
